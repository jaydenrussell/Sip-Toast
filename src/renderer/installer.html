<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP Caller ID - Installing</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            max-width: 400px;
            padding: 2rem;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: white;
        }
        .status {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: rgba(255, 255, 255, 0.9);
        }
        .progress {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .progress-bar {
            height: 100%;
            background: white;
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s ease;
        }
        .details {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
        }
        .version {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">SIP</div>
        <h1>SIP Caller ID</h1>
        <div class="status" id="status">Installing...</div>
        <div class="progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="details" id="details">Please wait while we set up SIP Caller ID on your system...</div>
        <div class="version" id="version"></div>
    </div>

    <script>
        const statusElement = document.getElementById('status');
        const progressBar = document.getElementById('progress-bar');
        const detailsElement = document.getElementById('details');
        const versionElement = document.getElementById('version');

        let progress = 0;
        const updateProgress = () => {
            progress += Math.random() * 10 + 5;
            if (progress > 95) progress = 95;
            progressBar.style.width = progress + '%';
            if (progress < 95) {
                setTimeout(updateProgress, 500);
            } else {
                progressBar.style.width = '100%';
                statusElement.textContent = 'Installation complete!';
                detailsElement.textContent = 'SIP Caller ID is now ready to use.';
            }
        };

        // Simulate installation progress
        setTimeout(() => {
            updateProgress();
        }, 1000);

        // Get version from main process
        if (window.process && window.process.versions.electron) {
            const { ipcRenderer } = require('electron');
            ipcRenderer.invoke('app:info').then(info => {
                versionElement.textContent = `Version ${info.version}`;
            });
        }
    </script>
</body>
</html>
