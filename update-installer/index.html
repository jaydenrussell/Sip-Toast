<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP Caller ID Update Installer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        .content {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .progress-container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
            border-radius: 6px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .status-text {
            font-size: 0.9rem;
            color: #64748b;
            margin-top: 10px;
            line-height: 1.4;
        }

        .error-message {
            color: #dc2626;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            text-align: left;
            display: none;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-icon {
            margin-right: 8px;
        }

        .footer {
            background: #fff;
            padding: 15px 30px;
            text-align: center;
            flex-shrink: 0;
            border-top: 1px solid #e5e7eb;
        }

        .footer p {
            font-size: 0.85rem;
            color: #6b7280;
            margin: 0;
        }

        .hidden {
            display: none;
        }

        .visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SIP Caller ID</h1>
        <p>Update Installer</p>
    </div>

    <div class="content">
        <div class="progress-container">
            <div class="progress-text">Preparing update...</div>
            <div class="progress-bar">
                <div class="progress-fill" style="width: 0%"></div>
            </div>
            <div class="status-text">Initializing update process</div>
            <div class="error-message" id="errorMessage"></div>
            <div class="buttons">
                <button class="btn btn-secondary" id="cancelBtn">
                    <span class="btn-icon">❌</span>
                    Cancel
                </button>
<button class="btn btn-primary" id="restartBtn" style="display: none;">
                    <span class="btn-icon">🚀</span>
                    Launch Updated App
                </button>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2024 SIP Caller ID. All rights reserved.</p>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const progressFill = document.querySelector('.progress-fill');
        const statusText = document.querySelector('.status-text');
        const errorMessage = document.getElementById('errorMessage');
        const cancelBtn = document.getElementById('cancelBtn');
        const restartBtn = document.getElementById('restartBtn');

        let isInstalling = false;

        // Get packages directory from command line arguments
        const packagesDir = process.argv.find(arg => arg.startsWith('--packages='))?.split('=')[1];

        if (!packagesDir) {
            showError('Update packages directory not found');
            disableCancel();
            return;
        }

        // Handle progress updates
        ipcRenderer.on('update:progress', (event, progress) => {
            progressFill.style.width = progress + '%';
            statusText.textContent = `Updating... ${progress}%`;
        });

        // Handle completion
        ipcRenderer.on('update:complete', async () => {
            isInstalling = false;
            progressFill.style.width = '100%';
            statusText.textContent = 'Update completed successfully!';
            cancelBtn.style.display = 'none';
            restartBtn.style.display = 'inline-flex';
            restartBtn.focus();
        });

        // Handle errors
        ipcRenderer.on('update:error', (event, error) => {
            showError(error);
            isInstalling = false;
            cancelBtn.textContent = 'Close';
        });

        // Handle cancellation
        ipcRenderer.on('update:canceled', () => {
            isInstalling = false;
            statusText.textContent = 'Update canceled';
            cancelBtn.textContent = 'Close';
        });

        // Start installation
        async function startInstallation() {
            if (isInstalling) return;
            isInstalling = true;

            try {
                await ipcRenderer.invoke('update:install', packagesDir);
            } catch (error) {
                showError(error.message);
                isInstalling = false;
                cancelBtn.textContent = 'Close';
            }
        }

        // Show error message
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('visible');
            errorMessage.classList.remove('hidden');
        }

        // Disable cancel button
        function disableCancel() {
            cancelBtn.disabled = true;
            cancelBtn.textContent = 'Close';
        }

        // Event listeners
        cancelBtn.addEventListener('click', () => {
            if (isInstalling) {
                ipcRenderer.invoke('update:cancel');
            } else {
                window.close();
            }
        });

restartBtn.addEventListener('click', async () => {
            try {
              await ipcRenderer.invoke('update:restart-app');
              window.close();
            } catch (error) {
              showError('Failed to launch updated application: ' + error.message);
            }
          });

        // Start installation automatically when ready
        document.addEventListener('DOMContentLoaded', () => {
            startInstallation();
        });
    </script>
</body>
</html>
